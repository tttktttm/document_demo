<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aspire Path UC編入支援サービス 書類審査システム — ログイン・アカウント作成">
  <title>Aspire Path 書類審査システム — ログイン</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="aspire-path-logo.png">
</head>
<body>
  <div class="app-container">
    <div class="auth-page">
      <div class="auth-card" id="authCard">

        <!-- Logo -->
        <div class="auth-card__logo">
          <img src="aspire-path-logo.png" alt="Aspire Path" style="height:80px;width:auto;object-fit:contain;display:block;margin:0 auto;">
          <div class="auth-card__logo-desc" style="margin-top:12px;">UC編入支援サービス 書類審査システム</div>
        </div>

        <!-- Login Form (default) -->
        <div id="loginForm">
          <div class="form-group">
            <label class="form-group__label" for="loginEmail">メールアドレス</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="example@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-group__label" for="loginPassword">パスワード</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="パスワードを入力" autocomplete="current-password">
          </div>
          <button class="btn btn--primary btn--full btn--lg" id="loginBtn" type="button">
            ログイン
          </button>
          <div style="text-align:right;margin-top:8px;">
            <a href="#" id="showResetPassword" style="font-size:12px;color:var(--text-muted);">パスワードを忘れた方</a>
          </div>

          <div class="auth-divider">または</div>

          <button class="btn btn--google btn--full" id="googleLoginBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Googleアカウントでログイン
          </button>

          <div class="auth-toggle">
            アカウントをお持ちでない方は <a href="#" id="showSignup">新規登録</a>
          </div>

          <!-- Demo Credentials -->
          <div style="margin-top: 24px; padding: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #64748b;">
            <div style="font-weight: 700; color: #475569; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
              <span>💡</span> デモ用アカウント
            </div>
            <div style="margin-bottom: 4px;"><strong>管理者:</strong> admin@demo.com</div>
            <div style="margin-bottom: 4px;"><strong>志願者:</strong> tanaka@example.com</div>
            <div style="font-size: 11px; margin-top: 8px; color: #94a3b8;">※パスワードは何を入力してもログイン可能です。</div>
          </div>
        </div>

        <!-- Signup Form (hidden) -->
        <div id="signupForm" class="hidden">
          <div class="form-group">
            <label class="form-group__label" for="signupName">お名前</label>
            <input type="text" class="form-input" id="signupName" placeholder="山田 太郎" autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-group__label" for="signupEmail">メールアドレス</label>
            <input type="email" class="form-input" id="signupEmail" placeholder="example@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-group__label" for="signupPassword">パスワード</label>
            <input type="password" class="form-input" id="signupPassword" placeholder="6文字以上" autocomplete="new-password">
            <div class="form-group__hint">パスワードは6文字以上で設定してください</div>
          </div>
          <button class="btn btn--primary btn--full btn--lg" id="signupBtn" type="button">
            アカウント作成
          </button>

          <div class="auth-divider">または</div>

          <button class="btn btn--google btn--full" id="googleSignupBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Googleアカウントで登録
          </button>

          <div class="auth-toggle">
            既にアカウントをお持ちの方は <a href="#" id="showLogin">ログイン</a>
          </div>
        </div>

        <!-- Password Reset Form (hidden) -->
        <div id="resetForm" class="hidden">
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:32px;margin-bottom:8px;">🔑</div>
            <div style="font-weight:700;font-size:18px;margin-bottom:6px;">パスワードリセット</div>
            <div class="text-muted" style="font-size:13px;">登録済みのメールアドレスを入力してください。<br>パスワード再設定用のメールをお送りします。</div>
          </div>
          <div class="form-group">
            <label class="form-group__label" for="resetEmail">メールアドレス</label>
            <input type="email" class="form-input" id="resetEmail" placeholder="example@email.com" autocomplete="email">
          </div>
          <button class="btn btn--primary btn--full btn--lg" id="resetBtn" type="button">
            リセットメールを送信
          </button>
          <div class="auth-toggle" style="margin-top:16px;">
            <a href="#" id="showLoginFromReset">← ログインに戻る</a>
          </div>
        </div>

        <!-- Error message area -->
        <div id="authError" class="alert alert--error hidden mt-md" role="alert">
          <span class="alert__icon">⚠️</span>
          <span id="authErrorMsg"></span>
        </div>

        <!-- Loading -->
        <div id="authLoading" class="loading-overlay hidden">
          <div class="spinner spinner--lg"></div>
          <span>処理中...</span>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
